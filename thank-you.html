  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #1a3a5c;
      --gold: #d4a017;
      --white: #ffffff;
      --text: #1f2937;
      --gray: #6b7280;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: #f8f9fb;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .ty-card {
      background: var(--white);
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 60px 48px;
      max-width: 560px;
      width: 100%;
      text-align: center;
    }
    .ty-icon { font-size: 4rem; margin-bottom: 24px; }
    h1 { font-size: 2rem; font-weight: 800; color: var(--navy); margin-bottom: 16px; }
    p { font-size: 1.05rem; color: var(--gray); line-height: 1.6; margin-bottom: 12px; }
    p strong { color: var(--text); }
    .btn {
      display: inline-block;
      margin-top: 28px;
      background: var(--gold);
      color: var(--white);
      padding: 14px 32px;
      border-radius: 6px;
      font-weight: 700;
      font-size: 1rem;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn:hover { background: #b8890f; }
    @media (max-width: 600px) {
      .ty-card { padding: 40px 24px; }
      h1 { font-size: 1.5rem; }
    }
  </style>
